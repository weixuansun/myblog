baseURL = "/"
languageCode = "zh-CN"
title = "Guts' blogs"
theme = "paper"

# 文章摘要长度
summaryLength = 100

# 启用 RSS
[outputs]
  home = ["HTML", "RSS"]

# 站点参数
[params]
  # 作者名（留空时页脚使用站点标题）
  author = ""
  # 站点描述
  description = "个人技术博客"

  # 社交链接（留空则不渲染）
  twitter = ""
  email = "weixuansun7@gmail.com"
  google_scholar = "https://scholar.google.com/citations?user=vIS56AoAAAAJ&hl=zh-CN"

  # zhihu = "your-zhihu-id"
  # wechat = ""

# 导航菜单
[menu]
  [[menu.main]]
    name = "logs"
    url = "/archives/"
    weight = 1
  [[menu.main]]
    name = "tags"
    url = "/tags/"
    weight = 2
  [[menu.main]]
    name = "about"
    url = "/about/"
    weight = 3

# URL 格式
[permalinks]
  posts = "/posts/:slug/"

# Markdown 渲染设置
[markup]
  [markup.highlight]
    style = "github"
    lineNos = false
    guessSyntax = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false
